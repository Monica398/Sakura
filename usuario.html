<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/usuario.css">
    <title>Usuario|Sakura</title>
</head>

<body>
    <!-- ===================================================== -->
    <!-- HEADER / BARRA DE NAVEGACIÓN -->
    <!-- ===================================================== -->

    <header class="header">

        <!-- LOGO -->
        <div class="logo">
            <h1>Sakura</h1>
            <p>LA FLORISTERÍA</p>
        </div>

        <!-- Checkbox oculto para abrir/cerrar el menú -->
        <input type="checkbox" id="menu-toggle" class="menu-toggle">

        <!-- Botón hamburguesa -->
        <label for="menu-toggle" class="menu-button">
            <span></span>
            <span></span>
            <span></span>
        </label>

        <!-- MENÚ DE NAVEGACIÓN -->
        <nav class="menu">
            <ul>
                <li><a href="index.html">INICIO</a></li>
                <li><a href="ramos.html">RAMOS</a></li>
                <li><a href="armar_Ramo.html">ARMAR RAMO</a></li>
                <li><a href="ocasiones.html">OCASIONES</a></li>
                <li><a href="detalles.html">DETALLES</a></li>
                <li><a href="#nosotros">NOSOTROS</a></li>
                <li><a href="#contacto">CONTACTO</a></li>
            </ul>
        </nav>

        <!-- ICONOS DEL MENÚ -->
        <div class="iconos">
            <a href="registro.html" class="icono-usuario">
                <img src="assets/images/person.png" alt="Ir al registro">
            </a>
        </div>

    </header>
    <!-- ============================================
CONTENIDO PRINCIPAL
============================================= -->
    <main class="pagina-login">
        <div class="tarjeta-login">
            <div class="icono-usuario">
                <img src="assets/images/user (2).png" alt="Usuario">
            </div>
            <h2 class="titulo-login">🌸USUARIO🌸</h2>
            <p class="subtitulo-login">Acceso para clientes</p>

            <!-- ============================================
FORMULARIO DE LOGIN
============================================= -->

            <form class="formulario-login" >

                <!-- CAMPO CORREO -->

                <div class="campo-grupo">
                    <label for="correo-login">CORREO ELECTRÓNICO</label>
                    <input type="email" id="correo-login" name="correo-login" placeholder="Tu correo electrónico"
                        required>
                </div>

                <!-- CAMPO CONTRASEÑA -->
                <div class="campo-grupo">
                    <label for="contrasena-login">CONTRASEÑA</label>
                    <div class="input-con-icono">
                        <input type="password" id="contrasena-login" name="contrasena" placeholder="Tu contraseña"
                            required>
                        <button type="button" class="btn-ojo" onclick="togglePasswordLogin('contrasena-login',this)">
                            <img src="assets/images/ojo.png" alt="Mostrar contraseña" class="img-ojo">
                        </button>
                    </div>
                </div>

                <!-- BOTÓN INICIAR SESIÓN -->
                <button type="submit" class="btn-iniciar-sesion">INICIAR SESIÓN</button>

                <!-- ENLACE A REGISTRO -->
                <p class="link-registro">
                    ¿No tienes cuenta?
                    <a href="registro.html">Regístrate aquí</a>
                </p>
            </form>

        </div>

    </main>
    <script src="js/usuario.js"></script>
</body>

</html>
